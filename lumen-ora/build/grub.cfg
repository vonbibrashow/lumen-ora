set default=0
set timeout=10

# Load required modules
insmod part_gpt
insmod part_msdos
insmod fat
insmod ext2
insmod all_video
insmod gfxterm
insmod png

# Terminal setup
terminal_output gfxterm
terminal_input console

# Resolution (comment out if it causes issues)
set gfxmode=auto
set gfxpayload=keep

# ─────────────────────────────────────────────────────────────────────────────
# Menu entries
# ─────────────────────────────────────────────────────────────────────────────

menuentry "Install Lumen Ora  [automated — erases selected drive]" --class ubuntu {
    set gfxpayload=keep
    linux   /casper/vmlinuz \
            quiet \
            autoinstall \
            ds=nocloud\;s=/cdrom/nocloud/ \
            fsck.mode=skip \
            ---
    initrd  /casper/initrd
}

menuentry "Install Lumen Ora  [safe graphics — use if screen is blank]" --class ubuntu {
    set gfxpayload=text
    linux   /casper/vmlinuz \
            nomodeset \
            autoinstall \
            ds=nocloud\;s=/cdrom/nocloud/ \
            fsck.mode=skip \
            ---
    initrd  /casper/initrd
}

menuentry "Install Lumen Ora  [manual partitioning]" --class ubuntu {
    set gfxpayload=keep
    linux   /casper/vmlinuz \
            quiet \
            ---
    initrd  /casper/initrd
}

menuentry "Boot from first disk  [skip installer]" --class hdd {
    set root=(hd1)
    chainloader +1
}

menuentry "Memory test (memtest86+)" --class memtest86 {
    linux   /boot/memtest86+.bin
}
