name: Tests

on: [push, pull_request]

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install core dependencies (all platforms)
        run: pip install httpx fastapi uvicorn sse-starlette pydantic rich ddgs pyttsx3 pillow

      - name: Install audio/input dependencies (Linux/macOS optional)
        if: runner.os != 'Windows'
        run: |
          pip install sounddevice soundfile || echo "audio deps optional; continuing"
        shell: bash

      - name: Install Windows-specific dependencies
        if: runner.os == 'Windows'
        run: pip install sounddevice soundfile keyboard

      - name: Layer 2 tool tests
        run: cd prototype && python test_e2e.py --skip-bridge --skip-model
        env:
          PYTHONIOENCODING: utf-8
